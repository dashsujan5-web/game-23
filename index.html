<!DOCTYPE html>
<html>
<head>
  <title>Find Me</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      touch-action: none;
    }

    canvas { display: block; }

    #overlay {
      position: absolute;
      width: 100%;
      top: 40%;
      text-align: center;
      color: white;
      font-size: 26px;
      transition: opacity 1.5s;
    }

    #joystickBase {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    #joystickKnob {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      top: 30px;
      left: 30px;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="overlay">
  <p id="text">
    I really do love you.<br><br>
    I’m just not very good with words...<br><br>
    So—here you go.
  </p>
</div>

<div id="joystickBase">
  <div id="joystickKnob"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// images
const playerImg = new Image();
const heartImg = new Image();
const finalImg = new Image();

let loaded = 0;
function checkLoad() {
  loaded++;
  if (loaded === 3) startGame();
}

playerImg.onload = checkLoad;
heartImg.onload = checkLoad;
finalImg.onload = checkLoad;

playerImg.src = "cursor.png";   // flowers raccoon
heartImg.src = "heart.png";     // coffee raccoon
finalImg.src = "final.png";     // bed raccoon

function startGame() {

let player = { x: canvas.width/2, y: canvas.height/2 };
let trail = [];

let target = {
  x: canvas.width * 0.7,
  y: canvas.height * 0.5
};

let keys = {};
let found = false;

// keyboard
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// fade intro
setTimeout(() => {
  overlay.style.opacity = 0;
}, 2000);

// movement
function move(){
  if(keys["ArrowUp"]) player.y -= 4;
  if(keys["ArrowDown"]) player.y += 4;
  if(keys["ArrowLeft"]) player.x -= 4;
  if(keys["ArrowRight"]) player.x += 4;

  trail.push({x:player.x,y:player.y});
  if(trail.length > 20) trail.shift();
}

// draw
function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // HEART (always visible)
  const pulse = 0.5 + 0.5*Math.sin(performance.now()*0.004);
  const hSize = 80 + pulse * 20;

  ctx.drawImage(
    heartImg,
    target.x - hSize/2,
    target.y - hSize/2,
    hSize,
    hSize
  );

  // trail
  ctx.globalAlpha = 0.3;
  for(let i=0;i<trail.length;i++){
    const p = trail[i];
    const a = i / trail.length;

    ctx.drawImage(
      playerImg,
      p.x - 20*a,
      p.y - 20*a,
      40*a,
      40*a
    );
  }
  ctx.globalAlpha = 1;

  // player
  ctx.drawImage(
    playerImg,
    player.x - 35,
    player.y - 35,
    70,
    70
  );
}

// check
function check(){
  const dx = player.x - target.x;
  const dy = player.y - target.y;

  if(Math.sqrt(dx*dx + dy*dy) < 60 && !found){
    found = true;
    setTimeout(reveal, 500);
  }
}

// reveal
function reveal(){
  overlay.style.opacity = 1;

  // hide canvas
  canvas.style.display = "none";

  document.body.style.background = "black";

  // container (vertical layout)
  const container = document.createElement("div");
  container.style.position = "absolute";
  container.style.top = "50%";
  container.style.left = "50%";
  container.style.transform = "translate(-50%, -50%)";
  container.style.display = "flex";
  container.style.flexDirection = "column";
  container.style.alignItems = "center";
  container.style.gap = "20px";
  container.style.zIndex = "1";

  // image
  const img = document.createElement("img");
  img.src = "final.png";
  img.style.width = "300px";
  img.style.borderRadius = "16px";
  img.style.boxShadow = "0 0 40px rgba(0,0,0,0.8)";

  // animation
  img.style.opacity = "0";
  img.style.transform = "scale(0.9)";
  img.style.transition = "opacity 1.5s ease, transform 1.5s ease";

  // text block
  const message = document.createElement("div");
  message.style.color = "white";
  message.style.textAlign = "center";
  message.style.fontSize = "22px";
  message.style.maxWidth = "320px";
  message.style.lineHeight = "1.6";
  message.style.opacity = "0";
  message.style.transition = "opacity 1.5s ease";
  
  message.innerHTML = `
    You found me.<br><br>
    I know I can be a jerk sometimes.<br><br>
    I'm sorry.<br><br>
    Happy 23rd month, baaby.<br><br>
  `;

  container.appendChild(img);
  container.appendChild(message);
  document.body.appendChild(container);

  // animate in
  setTimeout(() => {
    img.style.opacity = "1";
    img.style.transform = "scale(1)";
  }, 100);

  setTimeout(() => {
    message.style.opacity = "1";
  }, 800);

  // final line
  setTimeout(()=>{
    message.innerHTML += `<br><span style="font-size:28px;">I love love you.</span>`;
  },1800);
}
// loop
function loop(){
  if(!found){
    move();
    draw();
    check();
  }
  requestAnimationFrame(loop);
}

loop();
}
</script>

</body>
</html>
