<!DOCTYPE html>
<html>
<head>
  <title>Find Me</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas { display: block; }

    #overlay {
      position: absolute;
      width: 100%;
      top: 20%;
      text-align: center;
      color: white;
      font-size: 24px;
      transition: opacity 1.5s;
      z-index: 2;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div id="overlay">
  <p id="text">
    I really do love you.<br><br>
    I’m just not very good with words...<br><br>
    So—here you go.
  </p>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const isMobile = window.innerWidth < 768;

// images
const playerImg = new Image();
const heartImg = new Image();
const finalImg = new Image();

let loaded = 0;
function checkLoad() {
  loaded++;
  if (loaded === 3) startGame();
}

playerImg.onload = checkLoad;
heartImg.onload = checkLoad;
finalImg.onload = checkLoad;

playerImg.src = "cursor.png";
heartImg.src = "heart.png";
finalImg.src = "final.png";

function startGame() {

let player = { x: canvas.width/2, y: canvas.height/2 };
let target = {
  x: canvas.width * 0.7,
  y: canvas.height * 0.5
};

let trail = [];
let found = false;
let keys = {};

// keyboard (desktop)
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// touch movement (main control)
canvas.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];

  // smooth movement
  player.x += (touch.clientX - player.x) * 0.2;
  player.y += (touch.clientY - player.y) * 0.2;
});

// fade intro
setTimeout(() => overlay.style.opacity = 0, 2000);

// movement (desktop)
function move(){
  if(keys["ArrowUp"]) player.y -= 4;
  if(keys["ArrowDown"]) player.y += 4;
  if(keys["ArrowLeft"]) player.x -= 4;
  if(keys["ArrowRight"]) player.x += 4;

  trail.push({x:player.x,y:player.y});
  if(trail.length > 25) trail.shift();
}

// draw
function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const pulse = 0.5 + 0.5*Math.sin(performance.now()*0.004);

  const playerSize = isMobile ? 110 : 70;
  const heartBase = isMobile ? 130 : 80;

  const heartSize = heartBase + pulse * 20;

  // heart
  ctx.drawImage(
    heartImg,
    target.x - heartSize/2,
    target.y - heartSize/2,
    heartSize,
    heartSize
  );

  // trail
  ctx.globalAlpha = 0.3;
  for(let i=0;i<trail.length;i++){
    const p = trail[i];
    const a = i / trail.length;

    ctx.drawImage(
      playerImg,
      p.x - (playerSize/2)*a,
      p.y - (playerSize/2)*a,
      playerSize*a,
      playerSize*a
    );
  }
  ctx.globalAlpha = 1;

  // player
  ctx.drawImage(
    playerImg,
    player.x - playerSize/2,
    player.y - playerSize/2,
    playerSize,
    playerSize
  );
}

// check collision
function check(){
  const dx = player.x - target.x;
  const dy = player.y - target.y;

  if(Math.sqrt(dx*dx + dy*dy) < 80 && !found){
    found = true;
    setTimeout(reveal, 500);
  }
}

// reveal
function reveal(){
  overlay.style.opacity = 1;
  canvas.style.display = "none";
  document.body.style.background = "black";

  const container = document.createElement("div");
  container.style.position = "absolute";
  container.style.top = "50%";
  container.style.left = "50%";
  container.style.transform = "translate(-50%, -50%)";
  container.style.display = "flex";
  container.style.flexDirection = "column";
  container.style.alignItems = "center";
  container.style.gap = "20px";

  const img = document.createElement("img");
  img.src = "final.png";
  img.style.width = isMobile ? "260px" : "320px";
  img.style.borderRadius = "16px";
  img.style.boxShadow = "0 0 40px rgba(0,0,0,0.8)";
  img.style.opacity = "0";
  img.style.transform = "scale(0.9)";
  img.style.transition = "all 1.5s ease";

  const text = document.createElement("div");
  text.style.color = "white";
  text.style.textAlign = "center";
  text.style.maxWidth = "320px";
  text.style.fontSize = "20px";
  text.style.opacity = "0";
  text.style.transition = "opacity 1.5s ease";

  text.innerHTML = `
    You found me.<br><br>
    I know I can be a jerk sometimes.<br><br>
    I'm sorry.<br><br>
    Happy 23rd month, baaby.<br><br>
  `;

  container.appendChild(img);
  container.appendChild(text);
  document.body.appendChild(container);

  setTimeout(() => {
    img.style.opacity = "1";
    img.style.transform = "scale(1)";
  }, 100);

  setTimeout(() => {
    text.style.opacity = "1";
  }, 800);

  setTimeout(()=>{
    text.innerHTML += `<br><span style="font-size:26px;">I love love you.</span>`;
  },1800);
}

// loop
function loop(){
  if(!found){
    move();
    draw();
    check();
  }
  requestAnimationFrame(loop);
}

loop();
}
</script>

</body>
</html>
